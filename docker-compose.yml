services:
  db:
    image: postgres:16-alpine
    container_name: hermina-review-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hermina_reviews
      POSTGRES_USER: hermina
      POSTGRES_PASSWORD: change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermina -d hermina_reviews"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermina-review-api
    restart: unless-stopped
    env_file:
      - .env
    # environment: wins over env_file: by Compose precedence. DATABASE_URL is
    # pinned here on purpose so the api container always talks to the bundled
    # `db` service, regardless of what the developer's local .env points at
    # (e.g. a Supabase pooler URL used for non-Docker local dev). Deployments
    # using a managed/external Postgres should remove or override this line.
    environment:
      DATABASE_URL: postgresql://hermina:change_me@db:5432/hermina_reviews
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./exports:/app/exports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
